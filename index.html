        :root {
            --bg-color: #0f0f1a;
            --chat-bg: #1c1c2b;
            --header-bg: #2a2a40;
            --bot-msg-bg: #2a2a40;
            --user-msg-bg: #ff4757;
            --text-color: #ffffff;
            --text-muted: #a0a0b5;
            --border-color: #3a3a50;
            --accent-color: #ff4757;
            --accent-hover: #ff6b78;
            --success-color: #2ed573;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        @media (min-width: 480px) {
            .app-container {
                height: 90vh;
                border-radius: 20px;
                overflow: hidden;
            }
        }

        .chat-header {
            background-color: var(--header-bg);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .avatar {
            width: 45px;
            height: 45px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
            flex-shrink: 0;
        }

        .header-info h1 {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--success-color);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .header-info p::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .msg-bot-row { justify-content: flex-start; }
        .msg-user-row { justify-content: flex-end; }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .msg-bot {
            background-color: var(--bot-msg-bg);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }

        .msg-user {
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            width: 100%;
            max-width: 85%;
            align-self: flex-start;
            animation: slideUp 0.3s ease forwards;
        }

        .option-btn {
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .option-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .option-btn:hover .pizza-ingredients {
            color: rgba(255,255,255,0.8);
        }

        .option-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            border-color: var(--border-color);
            color: var(--text-muted);
        }

        .pizza-btn-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .pizza-ingredients {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.3;
            transition: color 0.2s ease;
        }

        .chat-footer {
            padding: 15px;
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 15px;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
            transition: border 0.3s;
        }

        .chat-input:focus { border-color: var(--accent-color); }
        .chat-input:disabled { opacity: 0.6; cursor: not-allowed; }

        .send-btn {
            background-color: var(--accent-color);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        .send-btn:hover:not(:disabled) { background-color: var(--accent-hover); }
        .send-btn:active:not(:disabled) { transform: scale(0.95); }
        .send-btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .typing-indicator { display: flex; gap: 4px; padding: 5px 0; }
        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.15s; }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* Overlay de fechado */
        .closed-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 15, 26, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .closed-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .closed-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 12px;
        }

        .closed-text {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .closed-hours {
            background: var(--header-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 24px;
            font-size: 14px;
            color: var(--text-color);
            line-height: 1.8;
        }

        .closed-hours span {
            color: var(--success-color);
            font-weight: bold;
        }

        /* Indicador de status no header */
        .status-closed p {
            color: var(--accent-color) !important;
        }

        .status-closed p::before {
            background-color: var(--accent-color) !important;
        }
    </style>
</head>

            'broto': { label: 'Broto (4 pedaços)', maxSabores: 2 },
            'media': { label: 'Média (6 pedaços)', maxSabores: 3 },
            'grande': { label: 'Grande (8 pedaços)', maxSabores: 4 }
        };

        let cart = [];
        let state = 'INIT';
        let tempOrder = {};
        let cliente = { nome: '', telefone: '', tipoEntrega: '', rua: '', numero: '', bairro: '', complemento: '' };

        const chatBody = document.getElementById('chat-body');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // ==== LÓGICA DE PROMOÇÃO ====
        function isDiaDePromocao() {
            const diaSemana = new Date().getDay();
            return diaSemana >= 1 && diaSemana <= 5;
        }

        function getPrecoPizza(sabor, tamanhoId) {
            let preco = sabor.prices[tamanhoId];
            let isPromo = false;

            if (isDiaDePromocao() && tamanhoId === 'grande') {
                if (sabor.id === 'p1' || sabor.id === 'p2' || sabor.id === 'p10' || sabor.id === 'p13' || sabor.id === 'p19' || sabor.id === 'p20'  || sabor.id === 'p25' || sabor.id === 'p30' || sabor.id === 'p31'){
                    preco = 50.00;
                    isPromo = true;
                }
            }
            return { preco, isPromo };
        }
        // ============================

        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function scrollToBottom() {
            setTimeout(() => { chatBody.scrollTop = chatBody.scrollHeight; }, 50);
        }

        function desabilitarBotoesAnteriores() {
            document.querySelectorAll('.option-btn:not(.disabled)').forEach(btn => {
                btn.classList.add('disabled');
                btn.removeAttribute('onclick');
            });
        }

        function setInputMode(enabled, placeholder) {
            userInput.disabled = !enabled;
            sendBtn.disabled = !enabled;
            userInput.placeholder = placeholder;
            if (enabled) {
                userInput.focus();
                userInput.onkeypress = function(e) { if(e.key === 'Enter') handleTextInput(); };
                sendBtn.onclick = handleTextInput;
            }
        }

        function addUserMessage(text) {
            desabilitarBotoesAnteriores();
            chatBody.insertAdjacentHTML('beforeend', `
                <div class="message-row msg-user-row">
                    <div class="message msg-user">${text}</div>
                </div>
            `);
            scrollToBottom();
        }

        function addBotMessage(text, options = null) {
            desabilitarBotoesAnteriores();
            
            const typingId = 'typing-' + Date.now();
            chatBody.insertAdjacentHTML('beforeend', `
                <div class="message-row msg-bot-row" id="${typingId}">
                    <div class="message msg-bot">
                        <div class="typing-indicator">
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                        </div>
                    </div>
                </div>
            `);
            scrollToBottom();

            setTimeout(() => {
                document.getElementById(typingId).remove();
                
                chatBody.insertAdjacentHTML('beforeend', `
                    <div class="message-row msg-bot-row">
                        <div class="message msg-bot">${text}</div>
                    </div>
                `);
                
                if (options && options.length > 0) {
                    let optionsHtml = `<div class="options-container">`;
                    options.forEach(opt => {
                        const param = typeof opt.value === 'string' ? `'${opt.value}'` : opt.value;

                        if (opt.ingredients) {
                            optionsHtml += `
                                <button class="option-btn" onclick="handleOptionClick('${opt.action}', ${param}, '${opt.label}')">
                                    <div class="pizza-btn-top">
                                        <span>${opt.label}</span>
                                        ${opt.priceText ? `<span>${opt.priceText}</span>` : ''}
                                    </div>
                                    <span class="pizza-ingredients">${opt.ingredients}</span>
                                </button>`;
                        } else {
                            optionsHtml += `
                                <button class="option-btn" onclick="handleOptionClick('${opt.action}', ${param}, '${opt.label}')">
                                    <div class="pizza-btn-top">
                                        <span>${opt.label}</span>
                                        ${opt.priceText ? `<span style="font-weight:bold">${opt.priceText}</span>` : ''}
                                    </div>
                                </button>`;
                        }
                    });
                    optionsHtml += `</div>`;
                    chatBody.insertAdjacentHTML('beforeend', optionsHtml);
                }
                scrollToBottom();
            }, 600);
        }

        // ─── Verificação de horário de funcionamento ───────────────────────────
        // Seg-Sáb: 17:30 às 23:30  (domingo: fechado)
        function verificarHorario() {
            const agora = new Date();
            const diaSemana = agora.getDay(); // 0=Dom, 1=Seg … 6=Sáb
            const hora = agora.getHours();
            const minuto = agora.getMinutes();
            const totalMinutos = hora * 60 + minuto;

            const abertura = 17 * 60 + 30;  // 17:30
            const fechamento = 23 * 60 + 30; // 23:30

            // Seg(1) a Sáb(6) e dentro do horário
            const aberto = diaSemana >= 1 && diaSemana <= 6
                        && totalMinutos >= abertura
                        && totalMinutos < fechamento;

            return aberto;
        }

        window.onload = () => {
            if (!verificarHorario()) {
                // Fora do horário: mostra overlay e oculta o chat
                document.getElementById('closed-overlay').style.display = 'flex';
                document.getElementById('chat-header').classList.add('status-closed');
                document.getElementById('status-text').textContent = 'Fechado no momento';
                // Desabilita input para garantia
                userInput.disabled = true;
                sendBtn.disabled = true;
                return; // Não inicia o bot
            }

            addBotMessage("Olá! 👋 Sou o assistente virtual da Pizzaria Fornalha de Ourinhos.");
            setTimeout(perguntarTipoEntrega, 1200);
        };

        function perguntarTipoEntrega() {
            state = 'TIPO_ENTREGA';
            addBotMessage("Seu pedido é para <b>entrega</b> ou <b>retirada</b>?", [
                { label: '🛵 Entrega', action: 'ESCOLHER_ENTREGA', value: 'entrega' },
                { label: '🏪 Retirada no local', action: 'ESCOLHER_ENTREGA', value: 'retirada' }
            ]);
        }

        window.handleOptionClick = function(action, value, label) {
            addUserMessage(label);
            
            switch(action) {
                case 'ESCOLHER_ENTREGA':    escolherTipoEntrega(value); break;
                case 'MENU_PRINCIPAL':      mostrarMenuPrincipal(); break;
                case 'VER_PIZZAS':          iniciarPedidoPizza(); break;
                case 'VER_BEBIDAS':         iniciarPedidoBebida(); break;
                case 'VER_CARRINHO':        mostrarCarrinho(); break;
                case 'FINALIZAR':           iniciarFinalizacao(); break;
                case 'SET_PIZZA_SIZE':      selecionarTamanhoPizza(value); break;
                case 'SET_PIZZA_QTD_SABOR': selecionarQtdSabores(value); break;  // ← CORRIGIDO
                case 'ADD_PIZZA_SABOR':     adicionarSaborPizza(value); break;
                case 'SEM_ALTERACAO':       confirmarSaborSemAlteracao(); break;
                case 'PEDIR_ALTERACAO':
                    state = 'WAITING_ALTERACAO';
                    setTimeout(() => {
                        addBotMessage("AVISO: A inclusão de novos ingredientes podem alterar os valores, mas um atendente te informará corretamente no final desse atendimento.");
                        addBotMessage("Digite a alteração desejada:");
                        setInputMode(true, "Ex: sem cebola, sem azeitona...");
                    }, 300);
                    break;
                case 'ADD_BEBIDA':          adicionarBebidaCarrinho(value); break;
                case 'ESCOLHER_TIPO_BORDA': escolherTipoBorda(value); break;
                case 'SET_BORDA':           selecionarBorda(value); break;
                case 'SEM_BORDA':           finalizarMontagemPizza(); break;
                case 'CANCELAR_ITEM':
                    tempOrder = {};
                    addBotMessage("Item cancelado.");
                    mostrarMenuPrincipal();
                    break;
                case 'PAGAMENTO_CARTAO':
                    cliente.pagamento = 'Cartão de crédito/débito';
                    enviarParaWhatsApp();
                    break;
                case 'PAGAMENTO_PIX':
                    cliente.pagamento = 'Pix';
                    mostrarChavePix();
                    break;
                case 'PAGAMENTO_DINHEIRO':
                    cliente.pagamento = 'Dinheiro';
                    perguntarTroco();
                    break;
                case 'TROCO_NAO':
                    cliente.troco = 'Sem troco';
                    enviarParaWhatsApp();
                    break;
            }
        };

        function handleTextInput() {
            const text = userInput.value.trim();
            if (!text) return;
            addUserMessage(text);
            userInput.value = '';

            if (state === 'WAITING_NAME_ENTREGA') {
                cliente.nome = text;
                state = 'WAITING_RUA';
                setTimeout(() => { addBotMessage(`Ótimo, ${cliente.nome}! Agora me informe a <b>rua</b> para entrega:`); setInputMode(true, "Digite a rua..."); }, 500);
            } else if (state === 'WAITING_RUA') {
                cliente.rua = text;
                state = 'WAITING_NUMERO';
                setTimeout(() => { addBotMessage("Qual o <b>número</b> do endereço?"); setInputMode(true, "Digite o número..."); }, 500);
            } else if (state === 'WAITING_NUMERO') {
                cliente.numero = text;
                state = 'WAITING_BAIRRO';
                setTimeout(() => { addBotMessage("Qual o <b>bairro</b>?"); setInputMode(true, "Digite o bairro..."); }, 500);
            } else if (state === 'WAITING_BAIRRO') {
                cliente.bairro = text;
                state = 'WAITING_COMPLEMENTO';
                setTimeout(() => { addBotMessage("Tem algum <b>complemento</b>? (ex: apto, bloco, referência) Se não tiver, digite <b>Não</b>:"); setInputMode(true, "Complemento ou 'Não'..."); }, 500);
            } else if (state === 'WAITING_COMPLEMENTO') {
                cliente.complemento = text;
                setInputMode(false, "Selecione uma opção acima...");
                state = 'MENU';
                setTimeout(() => { addBotMessage(`Perfeito! Endereço anotado. Agora vamos ao seu pedido! 🍕`); setTimeout(mostrarMenuPrincipal, 800); }, 500);
            } else if (state === 'WAITING_NAME_RETIRADA') {
                cliente.nome = text;
                setInputMode(false, "Selecione uma opção acima...");
                state = 'MENU';
                setTimeout(() => { addBotMessage(`Olá, ${cliente.nome}! Vamos montar seu pedido. 🍕`); setTimeout(mostrarMenuPrincipal, 800); }, 500);
            } else if (state === 'WAITING_TROCO') {
                cliente.troco = `Troco para R$ ${text}`;
                setInputMode(false, "Selecione uma opção acima...");
                state = 'DONE';
                setTimeout(enviarParaWhatsApp, 400);
            } else if (state === 'WAITING_ALTERACAO') {
                const idx = tempOrder.saboresSelecionados.length - 1;
                tempOrder.saboresSelecionados[idx].observacao = text;
                setInputMode(false, "Selecione uma opção acima...");
                state = 'PIZZA';
                const sabor = tempOrder.saboresSelecionados[idx];
                setTimeout(() => {
                    addBotMessage(`✏️ Anotado: <i>"${text}"</i> para o sabor <b>${sabor.name}</b>.`);
                    setTimeout(solicitarProximoSabor, 600);
                }, 400);
            }
        }

        function escolherTipoEntrega(tipo) {
            cliente.tipoEntrega = tipo;
            if (tipo === 'entrega') {
                state = 'WAITING_NAME_ENTREGA';
                setTimeout(() => { addBotMessage("⚠️ <b>Atenção:</b> A taxa de entrega será informada por um atendente.<br><br><b>Não efetue o pagamento antes da confirmação da taxa de entrega.</b><br><br>Para entrega, vou precisar de algumas informações. Primeiro, qual o seu <b>nome</b>?"); setInputMode(true, "Digite seu nome..."); }, 500);
            } else {
                state = 'WAITING_NAME_RETIRADA';
                setTimeout(() => { addBotMessage("Perfeito! Qual o <b>nome</b> para a retirada?"); setInputMode(true, "Digite seu nome..."); }, 500);
            }
        }

        function mostrarMenuPrincipal() {
            state = 'MENU';
            const opcoes = [
                { label: '🍕 Ver Pizzas', action: 'VER_PIZZAS' },
                { label: '🥤 Ver Bebidas', action: 'VER_BEBIDAS' }
            ];
            if (cart.length > 0) {
                opcoes.push({ label: '📦 Ver Pedido / Carrinho', action: 'VER_CARRINHO' });
                opcoes.push({ label: '✅ Finalizar Pedido', action: 'FINALIZAR' });
            }
            addBotMessage("Selecione uma opção:", opcoes);
        }

        function iniciarPedidoPizza() {
            tempOrder = { tipo: 'pizza', tamanho: '', maxSabores: 0, saboresSelecionados: [] };
            addBotMessage("Ótima escolha! Qual tamanho de pizza você prefere?", [
                { label: TAMANHOS.broto.label, action: 'SET_PIZZA_SIZE', value: 'broto' },
                { label: TAMANHOS.media.label, action: 'SET_PIZZA_SIZE', value: 'media' },
                { label: TAMANHOS.grande.label, action: 'SET_PIZZA_SIZE', value: 'grande' },
                { label: '⬅️ Voltar', action: 'MENU_PRINCIPAL' }
            ]);
        }

        function selecionarTamanhoPizza(tamanhoId) {
            const tam = TAMANHOS[tamanhoId];
            tempOrder.tamanho = tam.label;
            tempOrder.tamanhoId = tamanhoId;
            const maxPermitido = tam.maxSabores;
            
            const opcoes = [];
            for (let i = 1; i <= maxPermitido; i++) {
                let taxaTexto = (i >= 3) ? ' (+ R$ 5,00)' : '';
                opcoes.push({ label: `${i} Sabor${i > 1 ? 'es' : ''}${taxaTexto}`, action: 'SET_PIZZA_QTD_SABOR', value: i });
            }
            opcoes.push({ label: '❌ Cancelar', action: 'CANCELAR_ITEM' });
            addBotMessage(`Você escolheu ${tam.label}. Quantos sabores você quer?`, opcoes);
        }

        // ✅ FUNÇÃO CORRIGIDA — estava faltando no código original
        function selecionarQtdSabores(qtd) {
            tempOrder.maxSabores = qtd;
            solicitarProximoSabor();
        }

        function solicitarProximoSabor() {
            const numAtual = tempOrder.saboresSelecionados.length + 1;
            
            if (numAtual <= tempOrder.maxSabores) {
                const opcoes = CARDAPIO.pizzas.map(p => {
                    const infoPreco = getPrecoPizza(p, tempOrder.tamanhoId);
                    
                    let priceText = `<span style="font-weight:bold">${formatarMoeda(infoPreco.preco)}</span>`;
                    if (infoPreco.isPromo) {
                        priceText += ` <span style="color:var(--success-color); font-size:12px; margin-left:5px;">(Promoção)</span>`;
                    }

                    return {
                        label: p.name,
                        ingredients: p.ingredients,
                        priceText: priceText,
                        action: 'ADD_PIZZA_SABOR',
                        value: p.id
                    };
                });
                
                opcoes.push({ label: '❌ Cancelar', action: 'CANCELAR_ITEM' });
                addBotMessage(`Escolha o ${numAtual}º sabor:`, opcoes);
            } else {
                perguntarBorda(); 
            }
        }

        function perguntarBorda() {
            addBotMessage("Deseja adicionar <b>borda recheada</b>? 🍕", [
                { label: '🍬 Sim, borda doce', action: 'ESCOLHER_TIPO_BORDA', value: 'doce' },
                { label: '🧀 Sim, borda salgada', action: 'ESCOLHER_TIPO_BORDA', value: 'salgada' },
                { label: '❌ Não quero borda', action: 'SEM_BORDA', value: 'nenhuma' }
            ]);
        }

        function escolherTipoBorda(tipo) {
            const opcoes = CARDAPIO.bordas[tipo].map(b => ({
                label: b.name,
                priceText: formatarMoeda(b.price),
                action: 'SET_BORDA',
                value: b.id
            }));
            opcoes.push({ label: '⬅️ Voltar', action: 'CANCELAR_ITEM' });
            const tipoLabel = tipo === 'doce' ? 'doce' : 'salgada';
            addBotMessage(`Escolha o sabor da borda <b>${tipoLabel}</b>:`, opcoes);
        }

        function selecionarBorda(bordaId) {
            const todasBordas = [...CARDAPIO.bordas.doce, ...CARDAPIO.bordas.salgada];
            const borda = todasBordas.find(b => b.id === bordaId);
            tempOrder.borda = borda;
            finalizarMontagemPizza();
        }

        function adicionarSaborPizza(saborId) {
            const sabor = CARDAPIO.pizzas.find(p => p.id === saborId);
            tempOrder.saboresSelecionados.push({ ...sabor, observacao: '' });
            perguntarAlteracao(sabor);
        }

        function perguntarAlteracao(sabor) {
            addBotMessage(
                `Ótimo! Você escolheu <b>${sabor.name}</b>. 🍕<br>Deseja fazer alguma <b>alteração</b> nesse sabor?<br><span style="font-size:12px;color:var(--text-muted)">Ex: sem cebola, sem azeitona...</span>`,
                [
                    { label: '✏️ Sim, quero alterar', action: 'PEDIR_ALTERACAO', value: sabor.id },
                    { label: '✅ Não, está ótimo!', action: 'SEM_ALTERACAO', value: sabor.id }
                ]
            );
        }

        function confirmarSaborSemAlteracao() {
            solicitarProximoSabor();
        }

        function finalizarMontagemPizza() {
            const sabores = tempOrder.saboresSelecionados;
            const qtdSabores = sabores.length;
            if (qtdSabores === 0) return;

            let precoFinal = sabores.reduce((total, sabor) => {
                const infoPreco = getPrecoPizza(sabor, tempOrder.tamanhoId);
                return total + (infoPreco.preco / qtdSabores);
            }, 0);

            if (qtdSabores >= 3) precoFinal += 5;

            if (tempOrder.borda) precoFinal += tempOrder.borda.price;

            const saboresDesc = sabores.map(s =>
                s.observacao ? `${s.name} (${s.observacao})` : s.name
            ).join(', ');

            const bordaDesc = tempOrder.borda ? ` + Borda ${tempOrder.borda.name}` : '';
            const desc = `Pizza ${tempOrder.tamanho} (${saboresDesc})${bordaDesc}`;

            cart.push({ tipo: 'pizza', descricao: desc, preco: precoFinal });
            addBotMessage(`✅ ${desc} adicionada ao seu pedido! Valor: ${formatarMoeda(precoFinal)}.`);
            tempOrder = {};
            setTimeout(mostrarMenuPrincipal, 500);
        }

        function iniciarPedidoBebida() {
            const opcoes = CARDAPIO.bebidas.map(b => ({
                label: b.name,
                priceText: formatarMoeda(b.price),
                action: 'ADD_BEBIDA',
                value: b.id
            }));
            opcoes.push({ label: '⬅️ Voltar', action: 'MENU_PRINCIPAL' });
            addBotMessage("Escolha sua bebida:", opcoes);
        }

        function adicionarBebidaCarrinho(bebidaId) {
            const bebida = CARDAPIO.bebidas.find(b => b.id === bebidaId);
            cart.push({ tipo: 'bebida', descricao: bebida.name, preco: bebida.price });
            addBotMessage(`✅ ${bebida.name} adicionada ao pedido!`);
            setTimeout(mostrarMenuPrincipal, 500);
        }

        function mostrarCarrinho() {
            if (cart.length === 0) {
                addBotMessage("Seu carrinho está vazio.", [{ label: 'Ver Cardápio', action: 'MENU_PRINCIPAL' }]);
                return;
            }

            let resumo = "<b>Resumo do seu Pedido:</b><br><br>";
            let total = 0;
            cart.forEach(item => {
                resumo += `• ${item.descricao} - ${formatarMoeda(item.preco)}<br>`;
                total += item.preco;
            });
            resumo += `<br><b>Total: ${formatarMoeda(total)}</b>`;

            addBotMessage(resumo, [
                { label: '🍕 Adicionar mais itens', action: 'MENU_PRINCIPAL' },
                { label: '✅ Finalizar Pedido', action: 'FINALIZAR' }
            ]);
        }

        function iniciarFinalizacao() {
            if (cart.length === 0) {
                addBotMessage("Você precisa adicionar itens antes de finalizar.", [{ label: 'Ver Menu', action: 'MENU_PRINCIPAL' }]);
                return;
            }
            if (cliente.tipoEntrega === 'entrega') {
                perguntarFormaPagamento();

                setInputMode(false, "Processando pedido...");
                setTimeout(enviarParaWhatsApp, 800);
            }

        function perguntarFormaPagamento() {
            state = 'PAGAMENTO';
            addBotMessage("💳 Como você vai pagar?", [
                { label: '💳 Cartão de crédito / débito', action: 'PAGAMENTO_CARTAO', value: 'cartao' },

        function perguntarTroco() {
            addBotMessage("Vai precisar de troco?", [
                { label: '✅ Não preciso de troco', action: 'TROCO_NAO', value: 'nao' }
            ]);

                addBotMessage("Se precisar de troco, para quanto?");
                setInputMode(true, "Ex: 50, 100...");
                state = 'WAITING_TROCO';

        function mostrarChavePix() {
            state = 'DONE';
            setInputMode(false, "Processando pedido...");
            setTimeout(() => {
                chatBody.insertAdjacentHTML('beforeend', `
                    <div class="message-row msg-bot-row">
                        <div class="message msg-bot">
                            📱 <b>Pagamento via Pix</b><br><br>
                            Chave Pix (Celular):<br>

                            <span style="font-size:13px; color:var(--text-muted);">Em nome de <b>Elias Marichi</b></span><br><br>
                            <button onclick="copiarChavePix()" style="background:var(--success-color);border:none;color:#1c1c2b;padding:8px 16px;border-radius:10px;cursor:pointer;font-weight:bold;font-size:13px;margin-top:4px;">
                                📋 Copiar chave Pix
                            </button>
                        </div>
                    </div>
                `);
                scrollToBottom();
                setTimeout(mostrarBotaoWhatsApp, 800);
            }, 600);
        }

        function copiarChavePix() {
            navigator.clipboard.writeText('14996213939').then(() => {
                const btn = document.querySelector('[onclick="copiarChavePix()"]');
                if (btn) { btn.textContent = '✅ Chave copiada!'; btn.disabled = true; }
            });
        }

        function gerarLinkWhatsApp() {
            let total = 0;
            let itensTexto = "";
            cart.forEach(item => {
                itensTexto += `1x ${item.descricao} - ${formatarMoeda(item.preco)}\n`;
                total += item.preco;
            });

            let enderecoTexto = cliente.tipoEntrega === 'entrega'
                ? `*Tipo:* Entrega \n*Endereço:* ${cliente.rua}, ${cliente.numero} - ${cliente.bairro}${cliente.complemento && cliente.complemento.toLowerCase() !== 'não' ? ' (' + cliente.complemento + ')' : ''}`
                : `*Tipo:* Retirada no local`;

            let pagamentoTexto = '';
            if (cliente.pagamento) {
                pagamentoTexto = `\n*Forma de pagamento:* ${cliente.pagamento}`;
                if (cliente.troco && cliente.troco !== 'Sem troco') {
                    pagamentoTexto += ` (${cliente.troco})`;
                }
            }

            const mensagem = `*NOVO PEDIDO* \n\n*Cliente:* ${cliente.nome}\n${enderecoTexto}${pagamentoTexto}\n\n*ITENS DO PEDIDO:*\n-----------------------------------\n${itensTexto}-----------------------------------\n*TOTAL A PAGAR: ${formatarMoeda(total)}*`;
            return `https://wa.me/${ZAP_NUMBER}?text=${encodeURIComponent(mensagem)}`;
        }

        function mostrarBotaoWhatsApp() {
            const linkWhatsapp = gerarLinkWhatsApp();
            addBotMessage("Tudo pronto! Clique no botão acima para enviar ou recomeçar seu pedido.");
            setTimeout(() => {
                chatBody.insertAdjacentHTML('beforeend', `
                    <div class="options-container">
                        <a href="${linkWhatsapp}" target="_blank" style="text-decoration:none;">
                            <button class="option-btn" style="background-color:#2ed573; color:#1c1c2b; border-color:#2ed573; font-weight:bold; justify-content:center;">
                                📱 Enviar Pedido no WhatsApp
                            </button>
                        </a>
                        <button class="option-btn" onclick="location.reload()">🔄 Fazer novo pedido</button>
                    </div>
                `);
                scrollToBottom();
            }, 400);
        }

        function enviarParaWhatsApp() {
            state = 'DONE';
            setInputMode(false, "Processando pedido...");
            setTimeout(mostrarBotaoWhatsApp, 800);
        }
    </script>
</body>
</html>
